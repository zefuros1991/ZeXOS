# Static fallback monitor layout for Hyprland.
#
# Not currently sourced by hyprland.conf (which sources config/monitor.conf
# instead, with a generic "preferred, auto" default) -- kept here as a
# known-good starting point for whenever Hyprland is actually used day to
# day again as one of ZeXOS's selectable sessions.
#
# Deliberately no hardcoded `disable` for any specific output here. The
# niri config hit exactly that bug once: a stale static "off" block that
# persisted across reboots and docking states with no way to react to
# what was actually connected. Any future per-output override added to
# this file should follow niri's approach instead -- a dynamic tool
# (kanshi, which speaks the same wlr-output-management protocol Hyprland
# implements) handling dock/undock switching at runtime, with this file
# only providing a safe baseline if that tool isn't running yet.

monitor = , preferred, auto, 1
