# XDG Base Directory Specification
# This file defines the core user directory locations used by systemd and desktop environments.
# All applications should use these paths instead of creating files directly in $HOME.
#
# Single source of truth mirrored in three places, keep them identical:
#   - this file (systemd --user / graphical session, so GUI apps under niri inherit it)
#   - ~/.config/fish/conf.d/xdg.fish
#   - ~/.zshrc (marked "XDG Base Directory" block)
# Renamed from xdg.conf -> 10-xdg.conf and extended 2026-07-12 during the XDG
# cleanup pass. See /home/zefuros/dotbackup/MANIFEST.md.
# NOTE: environment.d only takes effect for NEW sessions (next login/reboot),
# not the currently running one.

XDG_CONFIG_HOME=$HOME/.config
XDG_CACHE_HOME=$HOME/.cache
XDG_DATA_HOME=$HOME/.local/share
XDG_STATE_HOME=$HOME/.local/state

# --- Per-app relocations ---
CARGO_HOME=${XDG_DATA_HOME}/cargo
CUDA_CACHE_PATH=${XDG_CACHE_HOME}/nv
NPM_CONFIG_CACHE=${XDG_CACHE_HOME}/npm
NPM_CONFIG_PREFIX=${XDG_DATA_HOME}/npm
NPM_CONFIG_INIT_MODULE=${XDG_CONFIG_HOME}/npm/config/npm-init.js
NPM_CONFIG_USERCONFIG=${XDG_CONFIG_HOME}/npm/npmrc
PULSE_COOKIE=${XDG_CONFIG_HOME}/pulse/cookie
WGETRC=${XDG_CONFIG_HOME}/wget/wgetrc

# Deliberately NOT adding a PATH= line here: systemd's environment.d
# generator runs very early and referencing ${PATH} here risks a malformed
# (leading/trailing-empty) PATH for the whole graphical session if the
# base PATH isn't populated yet at that point — not worth the risk for two
# bin dirs that don't even exist yet. Terminal apps under niri run fish or
# zsh anyway, and both already add $CARGO_HOME/bin and $NPM_CONFIG_PREFIX/bin
# safely in their own conf.d/xdg.fish and .zshrc blocks.
