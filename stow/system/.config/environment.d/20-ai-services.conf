# AI services env relocations (Cach, 2026-07-13/2026-07-13 follow-up)
# Kept separate from 10-xdg.conf deliberately - that file is maintained
# elsewhere; this one is scoped to AI-services-specific relocations added
# during the laptop AI homelab build-out. See:
#   ~/.claude/projects/-home-zefuros/memory/reference_laptop_ai_services_2026_07_13.md
#
# npm's cache/prefix/config are already redirected via 10-xdg.conf
# (NPM_CONFIG_CACHE/PREFIX/USERCONFIG/INIT_MODULE). npm additionally has a
# SEPARATE, undocumented-by-default debug-log directory that ignores
# NPM_CONFIG_CACHE and defaults to ~/.npm/_logs regardless - confirmed by
# testing (a real `npm install -g` created ~/.npm/_logs even with the cache
# var set correctly). This redirects it into the same XDG cache tree.
NPM_CONFIG_LOGS_DIR=${XDG_CACHE_HOME}/npm/_logs

# OpenClaw. As of 2026-07-14 this machine only runs the lightweight
# "node" role (openclaw-node.service, installed but disabled/dormant -
# it is not paired or pointed at any gateway). The real Gateway is meant
# to live on the Proxmox homelab per the master AI-stack plan; an earlier
# session mistakenly stood up a full Gateway here and it has been removed
# (see the reference memory file above for the original setup notes).
# These paths still apply to the node - it shares the same config/identity
# on-disk layout the gateway used. Defaults to ~/.openclaw otherwise; both
# are relocated onto the existing per-harness convention
# (~/AI/Harnesses/<Name>/ - see ai_harness_shared_layout memory).
# NOTE: OPENCLAW_WORKSPACE_DIR only affects *first-time* workspace creation
# (openclaw setup/onboard) - keeping it set is harmless and correct for any
# future re-scaffolding.
OPENCLAW_STATE_DIR=${HOME}/AI/Harnesses/OpenClaw/state
OPENCLAW_CONFIG_PATH=${HOME}/AI/Harnesses/OpenClaw/state/openclaw.json
OPENCLAW_WORKSPACE_DIR=${HOME}/AI/Harnesses/OpenClaw/state/workspace
